# Nginx: learniam.online apex (marketing landing)
# Copy to /etc/nginx/sites-available/learniam-apex on your VPS or Hostinger VPS.
# Guardian dashboard stays on guardian.learniam.online (see docs/deployment-learniam.md).

server {
    listen 80;
    server_name learniam.online www.learniam.online;

    root /opt/guardian/Sec/website/learniam;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}

# After certbot:
# sudo certbot --nginx -d learniam.online -d www.learniam.online
