name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core + web extras are required for the test suite. The SLM (llama-cpp)
          # and raw-network (scapy) extras are intentionally omitted: the suite
          # exercises graceful-degradation paths when they are absent.
          pip install -e ".[web]"
          # httpx2 is required by starlette's TestClient (used in test_web_server).
          pip install pytest pyflakes httpx2

      - name: Lint (pyflakes — no undefined names)
        run: |
          # Fail only on undefined names / syntax errors, which are real bugs.
          # Unused-import style noise is tolerated here.
          output="$(pyflakes guardian/ || true)"
          echo "$output"
          if echo "$output" | grep -iE "undefined|syntax"; then
            echo "::error::pyflakes found undefined names or syntax errors"
            exit 1
          fi
          echo "No undefined names."

      - name: Run tests
        run: pytest -q
